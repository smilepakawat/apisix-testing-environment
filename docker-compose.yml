services:
  apisix:
    image: ${APISIX_IMAGE_NAME}
    container_name: ${APISIX_NAME}
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ${PROJECT_DIR:-.}/apisix/plugins/:/opt/custom-plugins/apisix/plugins/
      - ${PROJECT_DIR:-.}${APISIX_CONF_PATH:-/conf}/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
      - ${PROJECT_DIR:-.}${APISIX_CONF_PATH:-/conf}/config.yaml:/usr/local/apisix/conf/config.yaml
    environment:
      - APISIX_STAND_ALONE=true

  apisix-testing-environment:
    build:
      context: ${SIXTE_HOME:-.}
      dockerfile: Dockerfile
    image: ${SIXTE_IMAGE_NAME}
    container_name: ${SIXTE_NAME}
    volumes:
      - ${PROJECT_DIR:-.}/apisix/plugins/:/opt/custom-plugins/apisix/plugins/
      - ${PROJECT_DIR:-.}/t:/opt/custom-plugins/t/
    working_dir: /usr/local/apisix-src
