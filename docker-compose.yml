services:
  # ── Standalone APISIX ─────────────────────────────────────────────────────
  # Runs APISIX with config_provider: yaml (no etcd).
  # Routes and upstreams are read from apisix/conf/apisix.yaml in your project.
  # Usage:  sixte run
  apisix:
    build:
      context: ${SIXTE_HOME:-.}
      dockerfile: Dockerfile
    image: ${IMAGE_NAME}
    container_name: ${SIXTE_NAME}-standalone
    ports:
      - "9080:9080"
    volumes:
      - ${PROJECT_DIR:-.}/apisix/plugins/:/opt/custom-plugins/apisix/plugins/
      - ${PROJECT_DIR:-.}/apisix/conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml

  # ── Integration-test harness ──────────────────────────────────────────────
  # etcd is started inside this container by the test command.
  # Managed by `sixte test`; not intended to be started manually.
  apisix-testing-environment:
    build:
      context: ${SIXTE_HOME:-.}
      dockerfile: Dockerfile
    image: ${IMAGE_NAME}
    container_name: ${SIXTE_NAME}
    volumes:
      - ${PROJECT_DIR:-.}/apisix/plugins/:/opt/custom-plugins/apisix/plugins/
      - ${PROJECT_DIR:-.}/t:/apisix/t
    working_dir: /usr/local/apisix-src
